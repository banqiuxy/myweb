<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI智能助手 - Nova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #10a37f;
        --primary-dark: #0d8a6a;
        --primary-light: #14c99a;
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --bg-tertiary: #2a2a2a;
        --text-primary: #ececf1;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border: #2d2d2d;
        --shadow: rgba(0, 0, 0, 0.3);
        --glow: rgba(16, 163, 127, 0.3);
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: linear-gradient(
          180deg,
          var(--bg-secondary) 0%,
          var(--bg-primary) 100%
        );
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 100;
      }

      .header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--primary),
          transparent
        );
        opacity: 0.5;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px var(--glow);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .logo-icon svg {
        width: 20px;
        height: 20px;
        fill: white;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        animation: blink 1.5s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
      }

      .chat-container::-webkit-scrollbar {
        width: 8px;
      }

      .chat-container::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      .chat-container::-webkit-scrollbar-thumb {
        background: var(--bg-tertiary);
        border-radius: 4px;
      }

      .chat-container::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      .welcome-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .welcome-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
        box-shadow: 0 10px 40px var(--glow);
      }

      .welcome-icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }

      .welcome-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        background: linear-gradient(
          135deg,
          var(--text-primary),
          var(--text-secondary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .welcome-subtitle {
        font-size: 1.125rem;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        max-width: 600px;
      }

      .suggestions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        max-width: 700px;
        width: 100%;
      }

      .suggestion {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
      }

      .suggestion:hover {
        background: var(--bg-tertiary);
        border-color: var(--primary);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px var(--shadow);
      }

      .suggestion-title {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
      }

      .suggestion-desc {
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      .message {
        display: flex;
        gap: 1rem;
        animation: messageIn 0.4s ease-out;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        flex-direction: row-reverse;
      }

      .message-avatar {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .message.assistant .message-avatar {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        box-shadow: 0 3px 10px var(--glow);
      }

      .message.user .message-avatar {
        background: var(--bg-tertiary);
      }

      .message-avatar svg {
        width: 18px;
        height: 18px;
        fill: white;
      }

      .message.user .message-avatar svg {
        fill: var(--text-secondary);
      }

      .message-content {
        flex: 1;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        line-height: 1.6;
        font-size: 0.9375rem;
      }

      .message.assistant .message-content {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px 12px 12px 0;
      }

      .message.user .message-content {
        background: var(--bg-tertiary);
        border-radius: 12px 12px 0 12px;
      }

      .message-content p {
        margin-bottom: 0.75rem;
      }

      .message-content p:last-child {
        margin-bottom: 0;
      }

      .message-content code {
        background: var(--bg-primary);
        padding: 0.125rem 0.375rem;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 0.875em;
      }

      .message-content pre {
        background: var(--bg-primary);
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0.75rem 0;
      }

      .message-content pre code {
        background: none;
        padding: 0;
      }

      .typing-indicator {
        display: flex;
        gap: 0.375rem;
        padding: 0.25rem 0;
      }

      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        animation: typing 1.4s ease-in-out infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes typing {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      .input-container {
        background: var(--bg-secondary);
        padding: 1.5rem 2rem;
        border-top: 1px solid var(--border);
        position: relative;
      }

      .input-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--primary),
          transparent
        );
        opacity: 0.3;
      }

      .input-wrapper {
        max-width: 800px;
        margin: 0 auto;
        position: relative;
      }

      .chat-input {
        width: 100%;
        padding: 1rem 3.5rem 1rem 1.25rem;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 1rem;
        font-family: inherit;
        resize: none;
        min-height: 56px;
        max-height: 200px;
        transition: all 0.3s ease;
      }

      .chat-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--glow);
      }

      .chat-input::placeholder {
        color: var(--text-muted);
      }

      .send-button {
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .send-button:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: scale(1.05);
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .send-button svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 768px) {
        .header {
          padding: 1rem;
        }

        .chat-container {
          padding: 1rem;
        }

        .welcome-title {
          font-size: 2rem;
        }

        .suggestions {
          grid-template-columns: 1fr;
        }

        .input-container {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </div>
        <span>Nova AI</span>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        <span>在线</span>
      </div>
    </header>

    <div class="chat-container" id="chatContainer">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </div>
        <h1 class="welcome-title">你好，我是 Nova</h1>
        <p class="welcome-subtitle">
          我是你的AI智能助手，可以帮助你解答问题、编写代码、创作内容，或是进行智能对话。有什么我可以帮助你的吗？
        </p>
        <div class="suggestions">
          <div
            class="suggestion"
            onclick="sendSuggestion('帮我写一段Python代码，实现快速排序算法')"
          >
            <div class="suggestion-title">💻 编写代码</div>
            <div class="suggestion-desc">
              帮我写一段Python代码，实现快速排序算法
            </div>
          </div>
          <div
            class="suggestion"
            onclick="sendSuggestion('解释一下什么是机器学习，用简单的例子说明')"
          >
            <div class="suggestion-title">📚 知识解答</div>
            <div class="suggestion-desc">
              解释一下什么是机器学习，用简单的例子说明
            </div>
          </div>
          <div
            class="suggestion"
            onclick="sendSuggestion('帮我写一篇关于人工智能发展趋势的文章大纲')"
          >
            <div class="suggestion-title">✍️ 内容创作</div>
            <div class="suggestion-desc">
              帮我写一篇关于人工智能发展趋势的文章大纲
            </div>
          </div>
          <div
            class="suggestion"
            onclick="sendSuggestion('给我推荐一些学习编程的资源和学习方法')"
          >
            <div class="suggestion-title">🎯 学习建议</div>
            <div class="suggestion-desc">
              给我推荐一些学习编程的资源和学习方法
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-container">
      <div class="input-wrapper">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="输入你的问题..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-button" id="sendButton" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <script>
      const chatContainer = document.getElementById("chatContainer");
      const chatInput = document.getElementById("chatInput");
      const sendButton = document.getElementById("sendButton");
      const welcomeScreen = document.getElementById("welcomeScreen");

      let isGenerating = false;

      function autoResize(textarea) {
        textarea.style.height = "auto";
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + "px";
      }

      function handleKeyDown(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      }

      function sendSuggestion(text) {
        chatInput.value = text;
        sendMessage();
      }

      function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function createMessageElement(role, content) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${role}`;

        const avatarDiv = document.createElement("div");
        avatarDiv.className = "message-avatar";

        if (role === "assistant") {
          avatarDiv.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>`;
        } else {
          avatarDiv.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>`;
        }

        const contentDiv = document.createElement("div");
        contentDiv.className = "message-content";

        if (role === "assistant") {
          contentDiv.innerHTML = formatContent(content);
        } else {
          contentDiv.textContent = content;
        }

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);

        return messageDiv;
      }

      function formatContent(content) {
        let formatted = content
          .replace(/```(\w+)?\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\n\n/g, "</p><p>")
          .replace(/\n/g, "<br>");

        return `<p>${formatted}</p>`;
      }

      function createTypingIndicator() {
        const messageDiv = document.createElement("div");
        messageDiv.className = "message assistant";
        messageDiv.id = "typingIndicator";

        const avatarDiv = document.createElement("div");
        avatarDiv.className = "message-avatar";
        avatarDiv.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>`;

        const contentDiv = document.createElement("div");
        contentDiv.className = "message-content";
        contentDiv.innerHTML = `<div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>`;

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);

        return messageDiv;
      }

      async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message || isGenerating) return;

        if (welcomeScreen) {
          welcomeScreen.classList.add("hidden");
        }

        const userMessage = createMessageElement("user", message);
        chatContainer.appendChild(userMessage);

        chatInput.value = "";
        chatInput.style.height = "auto";

        const typingIndicator = createTypingIndicator();
        chatContainer.appendChild(typingIndicator);
        scrollToBottom();

        isGenerating = true;
        sendButton.disabled = true;

        try {
          const response = await fetch(
            "https://api.deepseek.com/chat/completions",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer sk-3652a7eab4be4a178e300b21e39fbamn",
              },
              body: JSON.stringify({
                model: "deepseek-chat",
                messages: [
                  {
                    role: "system",
                    content:
                      "你是一个友好、专业、有帮助的AI助手，名叫Nova。你擅长编程、知识解答、内容创作等各种任务。请用简洁、有条理的方式回答问题。如果需要代码，请使用代码块格式化。",
                  },
                  {
                    role: "user",
                    content: message,
                  },
                ],
                stream: false,
              }),
            }
          );

          typingIndicator.remove();

          if (response.ok) {
            const data = await response.json();
            const assistantMessage = createMessageElement(
              "assistant",
              data.choices[0].message.content
            );
            chatContainer.appendChild(assistantMessage);
          } else {
            const errorMessage = createMessageElement(
              "assistant",
              "抱歉，服务暂时不可用。请稍后再试。"
            );
            chatContainer.appendChild(errorMessage);
          }
        } catch (error) {
          typingIndicator.remove();
          const fallbackMessage = createMessageElement(
            "assistant",
            getFallbackResponse(message)
          );
          chatContainer.appendChild(fallbackMessage);
        }

        isGenerating = false;
        sendButton.disabled = false;
        scrollToBottom();
      }

      function getFallbackResponse(message) {
        const lowerMessage = message.toLowerCase();

        if (
          lowerMessage.includes("代码") ||
          lowerMessage.includes("python") ||
          lowerMessage.includes("编程")
        ) {
          return `好的，我来帮你分析这个问题。\n\n以下是一些建议：\n\n1. 首先确保你的开发环境配置正确\n2. 检查代码语法是否有错误\n3. 使用版本控制管理你的代码\n4. 参考官方文档和社区资源\n\n如果你能提供具体的代码片段，我可以给出更详细的建议！`;
        }

        if (
          lowerMessage.includes("机器学习") ||
          lowerMessage.includes("人工智能") ||
          lowerMessage.includes("AI")
        ) {
          return `人工智能（AI）是当今最热门的技术领域之一！\n\n**机器学习**是AI的一个分支，简单来说就是让计算机通过数据学习和改进，而不需要明确的编程指令。\n\n**举例说明**：\n- 就像教小孩认识猫和狗，给他看很多猫和狗的图片，他慢慢就能自己分辨了\n- 推荐系统（如抖音、Netflix）会根据你的观看历史学习你的喜好\n- 自动驾驶通过学习大量路况数据来做出驾驶决策\n\n**主要类型**：\n- 监督学习：用标记的数据训练\n- 无监督学习：从无标记数据中发现模式\n- 强化学习：通过试错学习最优策略\n\n需要我深入讲解哪个方面吗？`;
        }

        if (
          lowerMessage.includes("学习") ||
          lowerMessage.includes("资源") ||
          lowerMessage.includes("方法")
        ) {
