<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>沉浸式塔罗 · 三牌阵抽取</title>
    <style>
      /* 全局重置与背景 */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(145deg, #1b0f33, #2a1552);
        color: #fff;
        padding: 15px;
      }

      /* 背景星空 */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: radial-gradient(
            1px 1px at 10% 20%,
            rgba(255, 255, 255, 0.8),
            transparent
          ),
          radial-gradient(
            1.5px 1.5px at 50% 80%,
            rgba(255, 255, 255, 0.6),
            transparent
          );
        background-size: 200px 200px;
        z-index: -1;
      }

      /* 主容器 */
      .container {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        padding: 25px 20px 35px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        text-align: center;
        width: 100%;
        max-width: 750px;
        transition: all 0.3s;
      }

      .header h1 {
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #d4b6ff, #88d0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
      }

      /* --- 阶段1：问题输入区 --- */
      #stepInput {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        margin-bottom: 20px;
      }
      #stepInput input {
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        padding: 14px 20px;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }
      #stepInput input:focus {
        border-color: #b388ff;
        box-shadow: 0 0 15px rgba(179, 136, 255, 0.2);
      }
      #stepInput input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .btn-main {
        background: linear-gradient(135deg, #b388ff, #7c4dff);
        border: none;
        color: #fff;
        padding: 14px 48px;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
        transition: 0.2s;
      }
      .btn-main:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 25px rgba(124, 77, 255, 0.5);
      }
      .btn-main:active {
        transform: scale(0.95);
      }
      .btn-main:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* --- 阶段2：牌阵区 --- */
      #stepSelect {
        display: none;
        flex-direction: column;
        align-items: center;
      }
      .instruction {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 1px;
        margin-bottom: 20px;
      }
      .instruction span {
        color: #d4af37;
        font-weight: bold;
      }

      /* 78张牌阵列（后台生成，用flex换行平铺） */
      #cardGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-bottom: 25px;
        max-height: 400px;
        overflow-y: auto;
        padding: 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
      }
      #cardGrid::-webkit-scrollbar {
        width: 4px;
      }
      #cardGrid::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      /* 单张小牌 */
      .mini-card {
        width: 50px;
        height: 70px;
        background: radial-gradient(circle at 30% 30%, #4b2a6e, #1f1240);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        color: #d4af37;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        position: relative;
      }
      .mini-card:hover {
        transform: translateY(-5px) scale(1.05);
        border-color: #b388ff;
        box-shadow: 0 8px 20px rgba(179, 136, 255, 0.2);
      }
      .mini-card.selected {
        border: 2px solid #ffd700;
        box-shadow: 0 0 15px #ffd700;
        transform: scale(1.05);
      }
      .mini-card.selected::after {
        content: "";
        position: absolute;
        top: -2px;
        right: -2px;
        width: 12px;
        height: 12px;
        background: #ffd700;
        border-radius: 50%;
      }

      /* 牌翻开后的显示区 */
      #stepResult {
        display: none;
        width: 100%;
        margin-top: 10px;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 15px;
      }

      /* AI 占卜解读区 */
      #readingResult {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        margin: 15px 0;
        text-align: left;
        font-size: 15px;
        line-height: 1.8;
        color: #f0ecf8;
        min-height: 60px;
        max-height: 400px;
        overflow-y: auto;
        white-space: pre-wrap;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }
      #readingResult::-webkit-scrollbar {
        width: 4px;
      }
      #readingResult::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
      }
      #readingResult.loading::before {
        content: "🔮 占卜解读中";
        display: block;
        text-align: center;
        color: #d4af37;
        font-size: 16px;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      #readingResult .error {
        color: #ff6b6b;
        text-align: center;
      }
      .result-card {
        background: linear-gradient(160deg, #f8f7fc, #e2dfec);
        color: #333;
        padding: 15px 5px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        min-height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .result-card .icon {
        font-size: 32px;
        margin-bottom: 8px;
      }
      .result-card .cn {
        font-size: 18px;
        font-weight: bold;
      }
      .result-card .en {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }

      .btn-reset {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        padding: 10px 30px;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 10px;
      }
      .btn-reset:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* ===== 新增：追问区域样式 ===== */
      #followUpArea {
        display: none;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      #followUpArea .follow-input-group {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }
      #followUpArea input {
        flex: 1;
        min-width: 200px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        padding: 12px 20px;
        color: #fff;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
      }
      #followUpArea input:focus {
        border-color: #b388ff;
        box-shadow: 0 0 15px rgba(179, 136, 255, 0.2);
      }
      #followUpArea input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .btn-follow {
        background: linear-gradient(135deg, #ffd700, #f9a825);
        border: none;
        color: #1b0f33;
        padding: 12px 28px;
        border-radius: 40px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        white-space: nowrap;
      }
      .btn-follow:hover {
        transform: scale(1.03);
        box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
      }
      .btn-follow:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-follow:active {
        transform: scale(0.95);
      }
      #followUpArea .follow-label {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 10px;
        display: block;
      }
      /* 追问时的loading状态 */
      #readingResult.follow-loading::before {
        content: "🔮 思考中...";
        display: block;
        text-align: center;
        color: #d4af37;
        font-size: 16px;
        animation: pulse 1.2s ease-in-out infinite;
      }

      /* 响应式适配 */
      @media (max-width: 480px) {
        .mini-card {
          width: 40px;
          height: 56px;
          font-size: 16px;
        }
        .result-card {
          min-height: 120px;
          padding: 10px 5px;
        }
        .result-card .cn {
          font-size: 15px;
        }
        #followUpArea .follow-input-group {
          flex-direction: column;
        }
        #followUpArea input {
          width: 100%;
          min-width: unset;
        }
        .btn-follow {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>✦ 心念塔罗</h1>
      </div>

      <!-- 步骤1：输入问题 -->
      <div id="stepInput">
        <input
          type="text"
          id="questionInput"
          placeholder="请输入你心中想问的问题..."
          maxlength="50"
        />
        <button class="btn-main" id="confirmBtn">确认问题，开始抽牌 ✨</button>
      </div>

      <!-- 步骤2：选择3张牌 -->
      <div id="stepSelect">
        <div class="instruction">
          请在下方牌阵中，选择你心仪的 <span>3</span> 张牌（已选
          <span id="selectCount">0</span>/3）
        </div>
        <div id="cardGrid"></div>
        <button class="btn-main" id="revealBtn" disabled>
          揭示命运之牌 🔮
        </button>
      </div>

      <!-- 步骤3：展示结果 -->
      <div id="stepResult">
        <div class="result-grid" id="resultGrid"></div>
        <div id="readingResult"></div>

        <!-- 追问区域 -->
        <div id="followUpArea">
          <span class="follow-label">💬 继续追问（AI会结合上下文回答）</span>
          <div class="follow-input-group">
            <input
              type="text"
              id="followInput"
              placeholder="输入你想追问的问题..."
              maxlength="100"
            />
            <button class="btn-follow" id="followBtn">发送追问 ✨</button>
          </div>
        </div>

        <button class="btn-reset" id="resetBtn">🔄 重新占卜</button>
      </div>
    </div>

    <script>
      // --- 1. 塔罗牌数据 (78张) ---
      const tarotDeck = [
        "愚者 The Fool",
        "魔术师 The Magician",
        "女祭司 The High Priestess",
        "女皇 The Empress",
        "皇帝 The Emperor",
        "教皇 The Hierophant",
        "恋人 The Lovers",
        "战车 The Chariot",
        "力量 Strength",
        "隐者 The Hermit",
        "命运之轮 Wheel of Fortune",
        "正义 Justice",
        "倒吊人 The Hanged Man",
        "死神 Death",
        "节制 Temperance",
        "恶魔 The Devil",
        "高塔 The Tower",
        "星星 The Star",
        "月亮 The Moon",
        "太阳 The Sun",
        "审判 Judgement",
        "世界 The World",
        "权杖王牌 Ace of Wands",
        "权杖二 Two of Wands",
        "权杖三 Three of Wands",
        "权杖四 Four of Wands",
        "权杖五 Five of Wands",
        "权杖六 Six of Wands",
        "权杖七 Seven of Wands",
        "权杖八 Eight of Wands",
        "权杖九 Nine of Wands",
        "权杖十 Ten of Wands",
        "权杖侍从 Page of Wands",
        "权杖骑士 Knight of Wands",
        "权杖王后 Queen of Wands",
        "权杖国王 King of Wands",
        "圣杯王牌 Ace of Cups",
        "圣杯二 Two of Cups",
        "圣杯三 Three of Cups",
        "圣杯四 Four of Cups",
        "圣杯五 Five of Cups",
        "圣杯六 Six of Cups",
        "圣杯七 Seven of Cups",
        "圣杯八 Eight of Cups",
        "圣杯九 Nine of Cups",
        "圣杯十 Ten of Cups",
        "圣杯侍从 Page of Cups",
        "圣杯骑士 Knight of Cups",
        "圣杯王后 Queen of Cups",
        "圣杯国王 King of Cups",
        "宝剑王牌 Ace of Swords",
        "宝剑二 Two of Swords",
        "宝剑三 Three of Swords",
        "宝剑四 Four of Swords",
        "宝剑五 Five of Swords",
        "宝剑六 Six of Swords",
        "宝剑七 Seven of Swords",
        "宝剑八 Eight of Swords",
        "宝剑九 Nine of Swords",
        "宝剑十 Ten of Swords",
        "宝剑侍从 Page of Swords",
        "宝剑骑士 Knight of Swords",
        "宝剑王后 Queen of Swords",
        "宝剑国王 King of Swords",
        "星币王牌 Ace of Pentacles",
        "星币二 Two of Pentacles",
        "星币三 Three of Pentacles",
        "星币四 Four of Pentacles",
        "星币五 Five of Pentacles",
        "星币六 Six of Pentacles",
        "星币七 Seven of Pentacles",
        "星币八 Eight of Pentacles",
        "星币九 Nine of Pentacles",
        "星币十 Ten of Pentacles",
        "星币侍从 Page of Pentacles",
        "星币骑士 Knight of Pentacles",
        "星币王后 Queen of Pentacles",
        "星币国王 King of Pentacles",
      ];

      const icons = [
        "🌿",
        "🔥",
        "💧",
        "🌪️",
        "⭐",
        "🌙",
        "☀️",
        "🌹",
        "🗡️",
        "💰",
        "🦁",
        "👑",
      ];

      // --- 2. DOM元素 ---
      const stepInput = document.getElementById("stepInput");
      const stepSelect = document.getElementById("stepSelect");
      const stepResult = document.getElementById("stepResult");
      const questionInput = document.getElementById("questionInput");
      const confirmBtn = document.getElementById("confirmBtn");
      const cardGrid = document.getElementById("cardGrid");
      const selectCount = document.getElementById("selectCount");
      const revealBtn = document.getElementById("revealBtn");
      const resultGrid = document.getElementById("resultGrid");
      const resetBtn = document.getElementById("resetBtn");
      const readingEl = document.getElementById("readingResult");

      // 追问相关
      const followUpArea = document.getElementById("followUpArea");
      const followInput = document.getElementById("followInput");
      const followBtn = document.getElementById("followBtn");

      // --- 3. 状态变量 ---
      let selectedCards = []; // 存储选中的3张牌的数据 { index, name, icon, cn, en }
      let currentQuestion = "";
      // 存储完整对话历史（用于追问上下文）
      let conversationHistory = [];

      // --- 4. 步骤1：确认问题 ---
      confirmBtn.addEventListener("click", () => {
        const q = questionInput.value.trim();
        if (!q) {
          questionInput.style.borderColor = "#ff6b6b";
          setTimeout(
            () => (questionInput.style.borderColor = "rgba(255,255,255,0.1)"),
            1000
          );
          return;
        }
        currentQuestion = q;
        // 重置对话历史
        conversationHistory = [];
        stepInput.style.display = "none";
        stepSelect.style.display = "flex";
        generateCardGrid();
      });

      questionInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") confirmBtn.click();
      });

      // --- 5. 步骤2：生成牌阵并抽牌 ---
      function generateCardGrid() {
        cardGrid.innerHTML = "";
        selectedCards = [];
        selectCount.textContent = "0";
        revealBtn.disabled = true;

        for (let i = 0; i < 78; i++) {
          const cardEl = document.createElement("div");
          cardEl.className = "mini-card";
          cardEl.textContent = "✦";
          cardEl.dataset.index = i;
          cardEl.addEventListener("click", () => handleCardClick(cardEl, i));
          cardGrid.appendChild(cardEl);
        }
      }

      function handleCardClick(el, index) {
        if (selectedCards.length >= 3 || el.classList.contains("selected"))
          return;

        const randomIndex = Math.floor(Math.random() * tarotDeck.length);
        const rawName = tarotDeck[randomIndex];

        let cn = rawName,
          en = "";
        if (rawName.includes(" ")) {
          const space = rawName.indexOf(" ");
          cn = rawName.substring(0, space);
          en = rawName.substring(space + 1);
        }

        selectedCards.push({
          name: rawName,
          cn: cn,
          en: en,
          icon: icons[Math.floor(Math.random() * icons.length)],
        });

        el.textContent = icons[Math.floor(Math.random() * icons.length)];
        el.style.fontSize = "24px";
        el.style.color = "#fff";
        el.style.background = "linear-gradient(160deg, #f8f7fc, #e2dfec)";
        el.classList.add("selected");

        selectCount.textContent = selectedCards.length;

        if (selectedCards.length === 3) {
          revealBtn.disabled = false;
        }
      }

      // --- 6. 核心：调用API（支持流式输出，带上下文） ---
      async function callTarotAPI(messages, targetElement, isFollowUp = false) {
        // 如果是追问，清空之前的内容并显示loading
        if (isFollowUp) {
          targetElement.className = "follow-loading";
          targetElement.textContent = "";
        } else {
          targetElement.className = "loading";
          targetElement.textContent = "";
        }

        try {
          const response = await fetch("https://taluo.banqiuxy.top/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "deepseek-v4-flash",
              messages: messages,
              stream: true,
            }),
          });

          if (!response.ok) {
            throw new Error(`API 请求失败 (${response.status})`);
          }

          targetElement.className = "";
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const data = line.slice(6).trim();
                if (data === "[DONE]") continue;
                try {
                  const parsed = JSON.parse(data);
                  const content = parsed.choices?.[0]?.delta?.content || "";
                  if (content) {
                    targetElement.textContent += content;
                    targetElement.scrollTop = targetElement.scrollHeight;
                  }
                } catch {
                  // 跳过解析失败的 chunk
                }
              }
            }
          }

          // 流式输出完成后，显示追问区域
          followUpArea.style.display = "block";
          followInput.value = "";
          followBtn.disabled = false;
          followInput.focus();

          return true;
        } catch (err) {
          targetElement.className = "";
          targetElement.innerHTML =
            '<div class="error">❌ 网络错误，请稍后重试</div>';
          console.error("API 调用出错:", err);
          return false;
        }
      }

      // --- 7. 揭示命运之牌 + 首次解读 ---
      revealBtn.addEventListener("click", async () => {
        stepSelect.style.display = "none";
        stepResult.style.display = "block";

        // 展示三张牌
        resultGrid.innerHTML = "";
        selectedCards.forEach((card) => {
          const div = document.createElement("div");
          div.className = "result-card";
          div.innerHTML = `
                <div class="icon">${card.icon}</div>
                <div class="cn">${card.cn}</div>
                <div class="en">${card.en}</div>
            `;
          resultGrid.appendChild(div);
        });

        // 构建系统提示 + 用户消息
        const systemPrompt =
          "你是一个友好、专业、有帮助的塔罗牌占卜师，你有超过多年的塔罗牌占卜经验，请你根据用户输入的问题和用户抽到的三张塔罗牌进行分析占卜。请注意，在你每次输出完毕的最后面要加上温馨提示提示用户占卜结果仅为心理趋势参考不可当真仅供娱乐类似的提示。";

        const cardNames = selectedCards.map((c) => c.name).join("、");
        const userMessage = `帮我解牌并分析塔罗牌，我的问题是「${currentQuestion}」，我抽到的塔罗牌是「${cardNames}」，请你帮我解牌。`;

        // 初始化对话历史（用于追问）
        conversationHistory = [
          { role: "system", content: systemPrompt },
          { role: "user", content: userMessage },
        ];

        // 调用API（首次解读，不显示追问区域）
        await callTarotAPI(conversationHistory, readingEl, false);

        // 注意：callTarotAPI 成功后会自动显示追问区域
      });

      // --- 8. 追问功能 ---
      followBtn.addEventListener("click", async () => {
        const followQuestion = followInput.value.trim();
        if (!followQuestion) {
          followInput.style.borderColor = "#ff6b6b";
          setTimeout(
            () => (followInput.style.borderColor = "rgba(255,255,255,0.1)"),
            1000
          );
          return;
        }

        // 禁用按钮，防止重复点击
        followBtn.disabled = true;
        followInput.disabled = true;

        // 将用户追问加入对话历史
        conversationHistory.push({ role: "user", content: followQuestion });

        // 调用API（追问模式）
        await callTarotAPI(conversationHistory, readingEl, true);

        // 将AI的回复也加入对话历史（因为流式输出无法直接获取完整回复，但我们通过监听内容变化来获取）
        // 由于流式是增量输出，我们无法在callTarotAPI结束后直接拿到完整内容，
        // 但我们可以通过读取readingEl.textContent来获取（此时流式已完成）
        const aiReply = readingEl.textContent;
        // 注意：如果之前有内容，需要追加，但callTarotAPI里已经清空了，所以直接push
        conversationHistory.push({ role: "assistant", content: aiReply });

        // 恢复输入
        followBtn.disabled = false;
        followInput.disabled = false;
        followInput.value = "";
        followInput.focus();
      });

      // 回车发送追问
      followInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") followBtn.click();
      });

      // --- 9. 重置 ---
      resetBtn.addEventListener("click", () => {
        // 重置所有
        stepResult.style.display = "none";
        stepInput.style.display = "flex";
        questionInput.value = "";
        questionInput.focus();
        followUpArea.style.display = "none";
        readingEl.textContent = "";
        readingEl.className = "";
        conversationHistory = [];
        selectedCards = [];
      });
    </script>
  </body>
</html>
