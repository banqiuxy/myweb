<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1222">
<meta name="description" content="MBTI 16型人格专业测试 · 纯前端本地计算 · 标准题库 · 隐私安全">
<title>MBTI 16型人格专业测试</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- 顶栏 -->
  <div class="topbar">
    <span class="brand" id="navHome"><span class="dot"></span> MBTI 测试</span>
    <button class="btn ghost sm" id="navGallery">16型图鉴</button>
  </div>

  <!-- 页面1：首页 -->
  <section class="page" id="page-home">
    <div class="home-hero">
      <h1><span class="grad">MBTI 16型人格</span><br>专业测试</h1>
      <p class="lead">严格遵循国际通用四维度二分法标准，60 题精准测评，本地计算、不上传任何数据。</p>
      <div class="features">
        <div class="feature"><div class="ico">🧠</div><div class="t">标准 60 题题库</div></div>
        <div class="feature"><div class="ico">🔒</div><div class="t">本地计算零上传</div></div>
        <div class="feature"><div class="ico">📊</div><div class="t">四维可视化报告</div></div>
      </div>
      <div class="home-cta">
        <button class="btn block" id="btnStart">开始测试</button>
        <button class="btn ghost block" id="btnResume" style="display:none">继续上次答题</button>
        <button class="btn ghost block" id="btnViewResult" style="display:none">查看上次结果</button>
      </div>
      <p class="home-note">纯前端本地计算 · 隐私安全 · 标准题库 · 无广告</p>
    </div>
  </section>

  <!-- 页面2：答题页 -->
  <section class="page" id="page-quiz">
    <div class="wrap" style="display:flex;flex-direction:column;flex:1;">
      <div class="quiz-progress">
        <div class="bar"><i id="progBar"></i></div>
        <span class="num" id="progNum">0%</span>
      </div>
      <div class="quiz-card">
        <div class="q-index" id="qIndex">第 1 / 60 题</div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="options"></div>
      </div>
      <div class="quiz-foot">
        <button class="btn ghost sm" id="btnPrev">← 上一题</button>
        <div class="spacer"></div>
        <button class="btn sm" id="btnNext">下一题 →</button>
      </div>
    </div>
  </section>

  <!-- 页面3：加载计算页 -->
  <section class="page" id="page-loading">
    <div class="spinner"></div>
    <div class="ld-text">正在生成你的人格结果…</div>
    <div class="ld-sub">本地计算中，请稍候</div>
  </section>

  <!-- 页面4：结果报告页 -->
  <section class="page" id="page-result">
    <div class="wrap">
      <div class="result-hero">
        <div class="result-code">
          <div class="letters" id="resCode">----</div>
          <div class="rname" id="resName">人格名称</div>
        </div>
      </div>

      <div class="dim-bars" id="dimBars"></div>

      <div class="radar-wrap" id="radarWrap"></div>

      <div class="card">
        <h3>核心概述</h3>
        <p id="resSummary"></p>
      </div>
      <div class="card">
        <h3>性格优势</h3>
        <ul id="resStrengths"></ul>
      </div>
      <div class="card">
        <h3>性格短板</h3>
        <ul id="resWeakness"></ul>
      </div>
      <div class="card">
        <h3>适合方向</h3>
        <div class="scene-grid" id="resScenes"></div>
      </div>
      <div class="card">
        <h3>人格标签</h3>
        <div class="tags" id="resTags"></div>
      </div>

      <div class="result-actions">
        <button class="btn" id="btnRestart">重新测试</button>
        <button class="btn ghost" id="btnCopy">复制结果</button>
        <button class="btn ghost" id="btnSaveImg">保存图片</button>
      </div>
    </div>
  </section>

  <!-- 页面5：16人格图鉴 -->
  <section class="page" id="page-gallery">
    <div class="wrap">
      <h2 style="font-size:22px;margin-bottom:6px;">16 型人格图鉴</h2>
      <p class="muted" style="font-size:14px;margin-bottom:18px;">点击任一人格查看完整解析</p>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </section>

</div>

<!-- 图鉴详情浮层 -->
<div class="overlay" id="overlay">
  <div class="obox" id="overlayBox"></div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
